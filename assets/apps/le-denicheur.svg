<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Le Dénicheur - icone squircle navy
    Metaphore : loupe qui revele une pepite (createur sous-monétisé)
    Couleurs : navy fond (cohérent avec alphapitch et alphabeast)
               or pour la pepite (cohérent avec la fleche dorée d'alphapitch)
  -->

  <defs>
    <!-- Fond navy degrade subtil -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c2348"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </linearGradient>

    <!-- Or de la pepite -->
    <linearGradient id="gemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFE08A"/>
      <stop offset="50%"  stop-color="#F2C75C"/>
      <stop offset="100%" stop-color="#C99524"/>
    </linearGradient>

    <!-- Reflet de la loupe (verre legerement lumineux) -->
    <radialGradient id="lensGlow" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Petite ombre sous la loupe pour decoller du fond -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle navy (rounded-rect 22%, approx iOS) -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bgGrad)"/>

  <!-- Sparkle decorative en haut a droite -->
  <g fill="#FFE08A" opacity="0.85">
    <path d="M 800 230 L 812 256 L 838 268 L 812 280 L 800 306 L 788 280 L 762 268 L 788 256 Z"/>
  </g>
  <!-- Sparkle decorative en bas a gauche -->
  <g fill="#FFE08A" opacity="0.7">
    <path d="M 230 760 L 238 776 L 254 784 L 238 792 L 230 808 L 222 792 L 206 784 L 222 776 Z"/>
  </g>

  <!-- Loupe : ensemble (manche + cercle) avec ombre -->
  <g filter="url(#softShadow)">
    <!-- Manche de la loupe (oblique, vers bas-droite) -->
    <line x1="640" y1="640" x2="850" y2="850"
          stroke="#ffffff" stroke-width="58" stroke-linecap="round"/>
    <!-- Petit accent or sur l'extremite du manche pour rappeler la pepite -->
    <circle cx="850" cy="850" r="14" fill="#F2C75C"/>

    <!-- Cercle exterieur de la loupe (verre + cadre) -->
    <circle cx="450" cy="450" r="240" fill="url(#bgGrad)" stroke="#ffffff" stroke-width="46"/>
    <!-- Glow leger dans le verre -->
    <circle cx="450" cy="450" r="217" fill="url(#lensGlow)"/>
  </g>

  <!-- Pepite (4-point star/gem) au centre de la loupe -->
  <g transform="translate(450,450)">
    <path d="M 0 -110 C 12 -50, 50 -12, 110 0 C 50 12, 12 50, 0 110 C -12 50, -50 12, -110 0 C -50 -12, -12 -50, 0 -110 Z"
          fill="url(#gemGrad)"/>
    <!-- Petit reflet blanc sur la pepite -->
    <path d="M -25 -55 C -10 -30, -10 -10, -28 0 C -38 -15, -38 -40, -25 -55 Z"
          fill="#ffffff" opacity="0.55"/>
  </g>
</svg>
