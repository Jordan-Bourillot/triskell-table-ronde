<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f12"/>
      <stop offset="60%" stop-color="#14171c"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Coccinelle stylisée -->
  <g transform="translate(600, 200)">
    <ellipse cx="0" cy="0" rx="100" ry="80" fill="#dc2626"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#0d0f12" stroke-width="6"/>
    <circle cx="-50" cy="-30" r="10" fill="#0d0f12"/>
    <circle cx="50" cy="-30" r="10" fill="#0d0f12"/>
    <circle cx="-40" cy="35" r="8" fill="#0d0f12"/>
    <circle cx="40" cy="35" r="8" fill="#0d0f12"/>
    <ellipse cx="0" cy="-72" rx="32" ry="20" fill="#0d0f12"/>
    <circle cx="-12" cy="-72" r="4" fill="#fff"/>
    <circle cx="12" cy="-72" r="4" fill="#fff"/>
  </g>

  <text x="600" y="420" text-anchor="middle"
        font-family="Cinzel, Georgia, serif"
        font-size="68"
        font-weight="700"
        fill="#ecebf5"
        letter-spacing="1">Bobeez</text>

  <text x="600" y="475" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="24"
        fill="#9aa0ab">
    Gestionnaire d'images moderne — calendrier, carte, tri.
  </text>

  <g transform="translate(600, 525)">
    <rect x="-100" y="-22" width="200" height="44" rx="22" fill="#c9a961"/>
    <text x="0" y="9" text-anchor="middle"
          font-family="-apple-system, Segoe UI, sans-serif"
          font-size="20" font-weight="700" fill="#1a1408">
      27 € · lancement · à vie
    </text>
  </g>

  <text x="600" y="600" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="14"
        fill="#6b7280"
        letter-spacing="2">
    TRISKELL STUDIO · BOBEEZ.TRISKELL-STUDIO.FR
  </text>
</svg>
