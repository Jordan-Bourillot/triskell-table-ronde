<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f12"/>
      <stop offset="60%" stop-color="#14171c"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Triskell symbol simplifié : 3 lobes -->
  <g transform="translate(600, 220)">
    <circle r="98" fill="none" stroke="#c9a961" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="0" cy="-50" rx="28" ry="48" fill="#a78bfa" transform="rotate(0)"/>
    <ellipse cx="43" cy="25" rx="28" ry="48" fill="#f97316" transform="rotate(120 43 25)"/>
    <ellipse cx="-43" cy="25" rx="28" ry="48" fill="#6366f1" transform="rotate(-120 -43 25)"/>
    <circle r="14" fill="#0d0f12" stroke="#c9a961" stroke-width="2"/>
  </g>

  <!-- Titre -->
  <text x="600" y="410" text-anchor="middle"
        font-family="Cinzel, Georgia, serif"
        font-size="76"
        font-weight="700"
        fill="#ecebf5"
        letter-spacing="2">La Table Ronde</text>

  <!-- Tagline -->
  <text x="600" y="468" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="26"
        fill="#9aa0ab"
        letter-spacing="0.5">
    Tous tes outils Triskell, en un seul endroit.
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#161a20"/>
  <rect x="0" y="570" width="1200" height="2" fill="url(#accent)"/>
  <text x="600" y="610" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="18"
        fill="#c9a961"
        letter-spacing="3"
        text-transform="uppercase"
        font-weight="600">
    TRISKELL STUDIO · APP.TRISKELL-STUDIO.FR
  </text>
</svg>
