<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">

  <title>Triskell Studio — Bientôt</title>
  <meta name="description" content="Triskell Studio — Le site arrive bientôt.">
  <link rel="canonical" href="https://triskell-studio.fr/">
  <link rel="icon" href="assets/triskell_mark.png" onerror="this.removeAttribute('href');">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #F8FAFC;
      --bg-2:      #FFFFFF;
      --text:      #0F172A;
      --muted:     #475569;
      --border:    rgba(15,23,42,.08);
      --card:      rgba(15,23,42,.04);
      --grad-1:    #6366F1;
      --grad-2:    #A78BFA;
      --grad-3:    #FB923C;
      --star:      rgba(15,23,42,.35);
    }

    [data-theme="muted"] {
      --bg:        #1E1E2A;
      --bg-2:      #262633;
      --text:      #D6D8E0;
      --muted:     #9CA0AE;
      --border:    rgba(255,255,255,.08);
      --card:      rgba(255,255,255,.04);
      --grad-1:    #818CF8;
      --grad-2:    #A78BFA;
      --grad-3:    #FB923C;
      --star:      rgba(255,255,255,.45);
    }

    [data-theme="dark"] {
      --bg:        #08080F;
      --bg-2:      #0D0D1A;
      --text:      #E2E8F0;
      --muted:     #94A3B8;
      --border:    rgba(255,255,255,.08);
      --card:      rgba(255,255,255,.03);
      --grad-1:    #818CF8;
      --grad-2:    #A78BFA;
      --grad-3:    #FB923C;
      --star:      rgba(255,255,255,.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 200ms ease, color 200ms ease;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* ---------- Animated background ---------- */

    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .35;
      transition: opacity 200ms ease;
      will-change: transform;
    }
    .orb-1 {
      top: -120px; left: -120px;
      width: 520px; height: 520px;
      background: var(--grad-1);
      animation: floatA 18s ease-in-out infinite;
    }
    .orb-2 {
      bottom: -140px; right: -100px;
      width: 560px; height: 560px;
      background: var(--grad-3);
      animation: floatB 22s ease-in-out infinite;
    }
    .orb-3 {
      top: 40%; left: 50%;
      width: 360px; height: 360px;
      background: var(--grad-2);
      opacity: .22;
      animation: floatC 26s ease-in-out infinite;
    }
    [data-theme="muted"] .orb { opacity: .22; }
    [data-theme="muted"] .orb-3 { opacity: .16; }
    [data-theme="dark"] .orb  { opacity: .28; }
    [data-theme="dark"] .orb-3 { opacity: .18; }

    @keyframes floatA {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(80px, 40px) scale(1.08); }
      66%      { transform: translate(-30px, 90px) scale(.96); }
    }
    @keyframes floatB {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%      { transform: translate(-60px, -40px) scale(1.1); }
      75%      { transform: translate(40px, -80px) scale(.94); }
    }
    @keyframes floatC {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-40%, -55%) scale(1.15); }
    }

    /* ---------- Stars (dark + muted only) ---------- */

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 400ms ease;
    }
    [data-theme="dark"] .stars,
    [data-theme="muted"] .stars { opacity: 1; }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--star);
      border-radius: 50%;
      animation: twinkle 4s ease-in-out infinite;
      box-shadow: 0 0 6px currentColor;
      color: var(--star);
    }

    @keyframes twinkle {
      0%, 100% { opacity: .15; transform: scale(.6); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    /* ---------- Theme switcher ---------- */

    .theme-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 6px;
      padding: 6px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      z-index: 10;
      backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(-12px);
      animation: dropIn 700ms cubic-bezier(.2,.8,.2,1) 200ms forwards;
    }
    .theme-switcher button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
    }
    .theme-switcher button:hover {
      color: var(--text);
      background: var(--card);
      transform: scale(1.08);
    }
    .theme-switcher button[aria-pressed="true"] {
      background: var(--text);
      color: var(--bg);
    }

    @keyframes dropIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Layout ---------- */

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* Parallax wrapper */
    .stage {
      position: relative;
      will-change: transform;
      transition: transform 400ms cubic-bezier(.2,.8,.2,1);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 800ms cubic-bezier(.2,.8,.2,1) 100ms forwards;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(64px, 18vw, 220px);
      line-height: .95;
      letter-spacing: -.04em;
      margin: 0;
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
    }

    h1 .letter {
      display: inline-block;
      background: linear-gradient(
        90deg,
        var(--grad-1) 0%,
        var(--grad-2) 35%,
        var(--grad-3) 70%,
        var(--grad-1) 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      transform: translateY(60px) rotateX(-90deg);
      transform-origin: 50% 100%;
      animation:
        letterIn 900ms cubic-bezier(.2,.8,.2,1) forwards,
        gradientShift 8s linear infinite;
    }
    h1 .letter:nth-child(1) { animation-delay: 400ms,  900ms; }
    h1 .letter:nth-child(2) { animation-delay: 500ms, 1000ms; }
    h1 .letter:nth-child(3) { animation-delay: 600ms, 1100ms; }
    h1 .letter:nth-child(4) { animation-delay: 700ms, 1200ms; }
    h1 .letter:nth-child(5) { animation-delay: 800ms, 1300ms; }
    h1 .letter:nth-child(6) { animation-delay: 900ms, 1400ms; }
    h1 .letter:nth-child(7) { animation-delay: 1000ms, 1500ms; }

    @keyframes letterIn {
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }
    @keyframes gradientShift {
      0%   { background-position:   0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .tagline {
      margin: 28px auto 0;
      font-size: clamp(15px, 1.4vw, 18px);
      color: var(--muted);
      max-width: 480px;
      line-height: 1.55;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 800ms cubic-bezier(.2,.8,.2,1) 1500ms forwards;
    }

    /* ---------- Countdown ---------- */

    .countdown {
      margin-top: 48px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 800ms cubic-bezier(.2,.8,.2,1) 1800ms forwards;
    }
    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 22px;
      min-width: 92px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      position: relative;
      isolation: isolate;
      overflow: hidden;
      transition: transform 200ms ease, border-color 200ms ease;
    }
    .countdown-item::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(129,140,248,.10) 0%,
        rgba(167,139,250,.06) 50%,
        rgba(251,146,60,.08) 100%);
      opacity: .55;
      z-index: -1;
    }
    .countdown-item:hover {
      transform: translateY(-3px);
      border-color: var(--grad-2);
    }
    .countdown-value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(32px, 5vw, 46px);
      line-height: 1;
      letter-spacing: -.02em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(
        90deg,
        var(--grad-1) 0%,
        var(--grad-2) 50%,
        var(--grad-3) 100%
      );
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 8s linear infinite;
    }
    .countdown-label {
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .countdown-item.seconds .countdown-value {
      animation: gradientShift 8s linear infinite, secPulse 1s ease-in-out infinite;
    }
    @keyframes secPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .75; transform: scale(.97); }
    }
    @media (max-width: 480px) {
      .countdown-item { min-width: 70px; padding: 14px 14px; border-radius: 14px; }
      .countdown-label { font-size: 9px; letter-spacing: .2em; }
    }

    .tagline .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--grad-2);
      border-radius: 50%;
      margin-left: 4px;
      box-shadow: 0 0 14px var(--grad-2);
      animation: pulse 1.6s ease-in-out infinite;
      vertical-align: baseline;
      transform: translateY(-1px);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: translateY(-1px) scale(1); }
      50%      { opacity: .35; transform: translateY(-1px) scale(.75); }
    }

    /* ---------- Meanwhile ---------- */

    .meanwhile {
      margin-top: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 800ms cubic-bezier(.2,.8,.2,1) 2100ms forwards;
    }
    .meanwhile-label {
      font-size: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .8;
    }
    .meanwhile-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .meanwhile-links a {
      position: relative;
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      text-decoration: none;
      overflow: hidden;
      isolation: isolate;
      transition: border-color 200ms ease, transform 200ms ease, color 200ms ease;
    }
    .meanwhile-links a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg,
        transparent 0%,
        transparent 30%,
        rgba(167,139,250,.18) 50%,
        transparent 70%,
        transparent 100%
      );
      background-size: 220% 100%;
      background-position: -120% 0;
      transition: background-position 600ms cubic-bezier(.2,.8,.2,1);
      z-index: -1;
    }
    .meanwhile-links a:hover {
      border-color: var(--grad-2);
      transform: translateY(-2px);
    }
    .meanwhile-links a:hover::before {
      background-position: 120% 0;
    }

    /* ---------- Shared ---------- */

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      h1 .letter { opacity: 1; transform: none; }
      .brand, .tagline, .meanwhile, .theme-switcher { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="theme-switcher" role="group" aria-label="Choix du thème">
    <button type="button" data-theme-btn="light"  aria-label="Thème clair"         aria-pressed="false">☀</button>
    <button type="button" data-theme-btn="muted"  aria-label="Thème intermédiaire" aria-pressed="false">◐</button>
    <button type="button" data-theme-btn="dark"   aria-label="Thème sombre"        aria-pressed="true">☾</button>
  </div>

  <main>
    <div class="stage" id="stage">
      <div class="brand">Triskell Studio</div>
      <h1 aria-label="Bientôt">
        <span class="letter">B</span><span class="letter">i</span><span class="letter">e</span><span class="letter">n</span><span class="letter">t</span><span class="letter">ô</span><span class="letter">t</span>
      </h1>
      <p class="tagline">Une nouvelle version arrive. Merci de votre patience<span class="dot"></span></p>

      <div class="countdown" id="countdown" aria-label="Compte à rebours avant le lancement officiel">
        <div class="countdown-item">
          <span class="countdown-value" id="cd-days">21</span>
          <span class="countdown-label">Jours</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-value" id="cd-hours">00</span>
          <span class="countdown-label">Heures</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-value" id="cd-mins">00</span>
          <span class="countdown-label">Minutes</span>
        </div>
        <div class="countdown-item seconds">
          <span class="countdown-value" id="cd-secs">00</span>
          <span class="countdown-label">Secondes</span>
        </div>
      </div>

      <div class="meanwhile">
        <span class="meanwhile-label">En attendant, retrouvez-nous sur</span>
        <div class="meanwhile-links">
          <a href="https://studio-wow.fr"      rel="noopener">studio-wow.fr</a>
          <a href="https://rankus-studio.fr"   rel="noopener">rankus-studio.fr</a>
          <a href="https://lagriffe-studio.fr" rel="noopener">lagriffe-studio.fr</a>
          <a href="https://eliks-studio.fr"    rel="noopener">eliks-studio.fr</a>
          <a href="https://pixel-pros.fr"      rel="noopener">pixel-pros.fr</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var KEY = 'triskell-theme';
      var root = document.documentElement;
      var buttons = document.querySelectorAll('[data-theme-btn]');

      function apply(theme) {
        root.setAttribute('data-theme', theme);
        buttons.forEach(function (b) {
          b.setAttribute('aria-pressed', b.dataset.themeBtn === theme ? 'true' : 'false');
        });
      }

      var saved = null;
      try { saved = localStorage.getItem(KEY); } catch (e) {}
      apply(saved || 'dark');

      buttons.forEach(function (b) {
        b.addEventListener('click', function () {
          var t = b.dataset.themeBtn;
          apply(t);
          try { localStorage.setItem(KEY, t); } catch (e) {}
        });
      });
    })();

    // --- Stars generator ---
    (function () {
      var host = document.getElementById('stars');
      if (!host) return;
      var count = window.innerWidth < 700 ? 40 : 80;
      var frag = document.createDocumentFragment();
      for (var i = 0; i < count; i++) {
        var s = document.createElement('span');
        s.className = 'star';
        s.style.left  = (Math.random() * 100) + '%';
        s.style.top   = (Math.random() * 100) + '%';
        var size = 1 + Math.random() * 2;
        s.style.width  = size + 'px';
        s.style.height = size + 'px';
        s.style.animationDelay    = (Math.random() * 4) + 's';
        s.style.animationDuration = (3 + Math.random() * 4) + 's';
        s.style.opacity = (.3 + Math.random() * .7).toFixed(2);
        frag.appendChild(s);
      }
      host.appendChild(frag);
    })();

    // --- Parallax on mouse ---
    (function () {
      var stage = document.getElementById('stage');
      var orbs  = document.querySelector('.orbs');
      if (!stage || !orbs) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      var targetX = 0, targetY = 0;
      var curX    = 0, curY    = 0;
      var raf     = null;

      function onMove(e) {
        var x = (e.clientX / window.innerWidth  - .5);
        var y = (e.clientY / window.innerHeight - .5);
        targetX = x;
        targetY = y;
        if (!raf) raf = requestAnimationFrame(tick);
      }

      function tick() {
        curX += (targetX - curX) * .08;
        curY += (targetY - curY) * .08;
        stage.style.transform = 'translate3d(' + (curX * 12) + 'px,' + (curY * 12) + 'px,0)';
        orbs.style.transform  = 'translate3d(' + (curX * -30) + 'px,' + (curY * -30) + 'px,0)';
        if (Math.abs(targetX - curX) > .001 || Math.abs(targetY - curY) > .001) {
          raf = requestAnimationFrame(tick);
        } else {
          raf = null;
        }
      }

      window.addEventListener('mousemove', onMove, { passive: true });
    })();

    // --- Countdown → lancement officiel ---
    (function () {
      // Lancement officiel : 2026-06-24 00:00 Europe/Paris.
      var target = new Date('2026-06-24T00:00:00+02:00').getTime();

      var elD = document.getElementById('cd-days');
      var elH = document.getElementById('cd-hours');
      var elM = document.getElementById('cd-mins');
      var elS = document.getElementById('cd-secs');
      if (!elD || !elH || !elM || !elS) return;

      function pad(n) { return n < 10 ? '0' + n : '' + n; }

      function tick() {
        var diff = target - Date.now();
        if (diff < 0) diff = 0;
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff / 3600000) % 24);
        var m = Math.floor((diff / 60000) % 60);
        var s = Math.floor((diff / 1000) % 60);
        elD.textContent = pad(d);
        elH.textContent = pad(h);
        elM.textContent = pad(m);
        elS.textContent = pad(s);
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
